<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Flag Project</title>
    <style>
      /* Write your CSS Code here */
      .flag {
        background-color: rgb(206, 27, 38);
        height: 400px;
        width: 600px;
        position: relative;
      }

      .flag > div {
        position: absolute;
        background-color: rgb(0, 40, 104);
        left: 50;
        top: 25%;
        width: 600px;
        height: 50%;
      }
      .flag > div > div {
        height: 200px;
        width: 200px;
        background-color: rgb(255, 255, 255);
        border-radius: 50%;
        position: absolute;
        left: 180px;
        top: 0px;
      }
      .flag > p {
        color: white;
        font-size: 50px;
        text-align: center;
        position: absolute;
        left: 180px;
        top: -50px;
      }
      p {
        font-family: "Courier New", Courier, monospace;
        font-size: 50px;
        text-align: center;
        position: relative;
        top: -40px;
      }
    </style>
  </head>

  <!-- 
  IMPORTANT! Do not change any HTML
Don't add any classes/ids/elements 
Use what you know about combining selectors 
and CSS specificity instead.
Hint 1: The flag is 900px by 600px and the circle is 200px by 200px.
Hint 2: You can use CSS inspection to get the colors from
https://appbrewery.github.io/flag-of-laos/
-->

  <body>
    <div class="flag">
      <p>The Flag</p>
      <div>
        <div>
          <p>of<br />Laos</p>
        </div>
      </div>
    </div>
  </body>
</html>
