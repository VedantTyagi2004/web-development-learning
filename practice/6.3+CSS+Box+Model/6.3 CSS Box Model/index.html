<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CSS Box Model</title>
    <style>
      /* Write your CSS code here */
      #blue {
        background: rgb(183, 183, 216);
        height: 200px;
        width: 200px;
        padding: 20px;
        border: 10px solid black;
      }
      #gold {
        background-color: gold;
        height: 200px;
        width: 200px;
        padding: 0px 00px 0px 0px;
        margin: 0px 0px 0px 260px;
        border: 20px solid black;
        border-width: 20px 10px 20px 10px;
      }
      #indianred {
        background-color: indianred;
        height: 200px;
        width: 200px;
        border: 10px solid black;
        margin: 0px 0px 0px 40px;
      }
      p {
        margin: 0px;
      }
    </style>
  </head>

  <body>
    <div id="blue">
      <p>
        Lorem ipsum dolor sit amet, consectetur adipiscing elit. Aliquam at
        sapien porttitor urna elementum lacinia. In id magna pulvinar, ultricies
        lorem id, vehicula elit. Aliquam eu luctus nisl, vitae pellentesque
        magna. Phasellus dolor metus, laoreet ac convallis sit amet, efficitur
        sed dolor.
      </p>
    </div>
    <div id="gold"></div>
    <div id="indianred"></div>
  </body>
</html>
